name: flutter_application_1
description: "Detailing Pro - Business management app for detailing studios and specialists."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  pdf: ^3.11.3
  printing: ^5.14.2
  table_calendar: ^3.0.9
  intl: ^0.20.2
  url_launcher: ^6.3.0
  flutter_local_notifications: ^17.2.2
  flutter_timezone: ^5.0.2
  timezone: ^0.9.4
  firebase_core: ^3.15.2
  firebase_auth: ^5.6.2
  google_sign_in: ^6.3.0
  cloud_firestore: ^5.6.11
  firebase_storage: ^12.4.10
  firebase_messaging: ^15.1.4
  firebase_crashlytics: ^4.1.3
  file_picker: ^8.1.7
  gal: ^2.3.0
  image: ^4.2.0
  flutter_secure_storage: ^9.2.4
  purchases_flutter: ^9.15.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.13.1"
  mockito: ^5.4.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/images/icon.png"
